<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Equipamento - MedTech Solutions</title>

    <link rel="shortcut icon" href="../../assets/img/hospital125.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>

<body>

    <header class="bng-navbar-menu">
        <div>
            <a href="../../index.html">
                <img src="../../assets/img/hospital255.png" alt="Logo MedTech Solutions">
            </a>
            <h3>MedTech Solutions</h3>
        </div>
        <div>
            <button>Utilizador</button>
        </div>
    </header>

    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-cogs"></i><span>Equipamentos</span></a>
            <a href="../localizacoes/lista.html"><i class="fas fa-location-dot"></i><span>Localizações</span></a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i><span>Fornecedores</span></a>
            <a href="../documentacao/lista.html"><i class="fas fa-file-medical"></i><span>Documentação</span></a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="../ferramentas/ferramentas.html"><i class="fas fa-screwdriver-wrench"></i><span>Ferramentas</span></a>
        </nav>
    </aside>

    <main class="content">
        <div class="form-wrapper">
            <h2><strong><i class="fa-regular fa-pen-to-square"></i> Editar equipamento</strong></h2>
            <hr>

            <form action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="codigo">Código Interno de Inventário</label>
                    <input type="text" id="codigo" name="codigo" value="EQ-001" required>
                </div>

                <div class="form-group">
                    <label for="designacao">Designação do Equipamento</label>
                    <input type="text" id="designacao" name="designacao" value="Monitor Multiparamétrico" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" name="categoria">
                        <option>Escolha uma opção</option>
                        <option value="monitorizacao" selected>Monitorização</option>
                        <option value="suporte_vida">Suporte de Vida</option>
                        <option value="terapia">Terapia</option>
                        <option value="diagnostico">Diagnóstico</option>
                        <option value="laboratorio">Laboratório</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" value="Philips" required>
                </div>

                <div class="form-group">
                    <label for="modelo">Modelo</label>
                    <input type="text" id="modelo" name="modelo" value="IntelliVue MP5" required>
                </div>

                <div class="form-group">
                    <label for="numero_serie">Número de Série</label>
                    <input type="text" id="numero_serie" name="numero_serie" value="MP5-2022-45873" required>
                </div>

                <div class="form-group">
                    <label for="fabricante">Fabricante</label>
                    <input type="text" id="fabricante" name="fabricante" value="Philips">
                </div>

                <div class="form-group">
                    <label for="data_aquisicao">Data de Aquisição</label>
                    <input type="date" id="data_aquisicao" name="data_aquisicao" value="2023-02-10">
                </div>

                <div class="form-group">
                    <label for="ano_fabrico">Ano de Fabrico</label>
                    <input type="number" id="ano_fabrico" name="ano_fabrico" value="2022">
                </div>

                <div class="form-group">
                    <label for="custo_aquisicao">Custo de Aquisição</label>
                    <input type="text" id="custo_aquisicao" name="custo_aquisicao" value="7500">
                </div>

                <div class="form-group">
                    <label for="tipo_entrada">Tipo de Entrada</label>
                    <select id="tipo_entrada" name="tipo_entrada">
                        <option>Escolha uma opção</option>
                        <option value="compra" selected>Compra</option>
                        <option value="doacao">Doação</option>
                        <option value="aluguer">Aluguer</option>
                        <option value="emprestimo">Empréstimo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estado">Estado Atual</label>
                    <select id="estado" name="estado">
                        <option>Escolha uma opção</option>
                        <option value="ativo" selected>Ativo</option>
                        <option value="inativo">Inativo</option>
                        <option value="manutencao">Em manutenção</option>
                        <option value="abatido">Abatido</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="criticidade">Criticidade</label>
                    <select id="criticidade" name="criticidade">
                        <option>Escolha uma opção</option>
                        <option value="baixa">Baixa</option>
                        <option value="media">Média</option>
                        <option value="alta">Alta</option>
                        <option value="suporte_vida" selected>Suporte de Vida</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes"
                        rows="4">Equipamento em funcionamento na UCI.</textarea>
                </div>

                <div class="form-buttons">
                    <a href="lista.html"><i class="fa-solid fa-xmark"></i> Cancelar</a>
                    <button type="submit"><i class="fa-regular fa-floppy-disk"></i> Guardar alterações</button>
                </div>

                <div class="alert text-center">
                    Erro simples
                </div>
            </form>
        </div>
    </main>

</body>

</html>
