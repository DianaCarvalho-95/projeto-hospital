<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Localização - MedTech Solutions</title>

    <link rel="shortcut icon" href="../../assets/img/hospital125.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>

<body>

    <header class="bng-navbar-menu">
        <div>
            <a href="../../index.html">
                <img src="../../assets/img/hospital255.png" alt="Logo MedTech Solutions">
            </a>
            <h3>MedTech Solutions</h3>
        </div>
        <div>
            <button>Utilizador</button>
        </div>
    </header>

    <aside class="sidebar">
        <h4>Menu</h4>
        <nav>
            <a href="../equipamentos/lista.html"><i class="fas fa-cogs"></i><span>Equipamentos</span></a>
            <a href="lista.html"><i class="fas fa-location-dot"></i><span>Localizações</span></a>
            <a href="../fornecedores/lista.html"><i class="fas fa-truck-medical"></i><span>Fornecedores</span></a>
            <a href="../documentacao/documentacao.html"><i class="fas fa-file-medical"></i><span>Documentação</span></a>
            <a href="../dashboard/dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
        </nav>
    </aside>

    <main class="content">
        <div class="form-wrapper">
            <h2><strong><i class="fa-solid fa-location-dot"></i> Inserir nova localização</strong></h2>
            <hr>

            <form action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="edificio">Edifício</label>
                    <input type="text" id="edificio" name="edificio" required>
                </div>

                <div class="form-group">
                    <label for="piso">Piso</label>
                    <input type="text" id="piso" name="piso" required>
                </div>

                <div class="form-group">
                    <label for="servico">Serviço / Departamento</label>
                    <input type="text" id="servico" name="servico" required>
                </div>

                <div class="form-group">
                    <label for="sala">Sala</label>
                    <input type="text" id="sala" name="sala" required>
                </div>

                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" rows="4"></textarea>
                </div>

                <div class="form-buttons">
                    <a href="lista.html"><i class="fa-solid fa-xmark"></i> Cancelar</a>
                    <button type="submit"><i class="fa-regular fa-floppy-disk"></i> Guardar</button>
                </div>

                <div class="alert text-center">
                    Erro simples
                </div>
            </form>
        </div>
    </main>

</body>

</html>
